name: doppler-export-secrets
description: >-
  Export selected Doppler secrets into GITHUB_ENV so later workflow steps can
  consume them like ordinary environment variables.

inputs:
  token:
    description: >-
      Doppler token authorized to read platform/common. The action will use it
      directly for platform secrets, or exchange it for <APP>_DOPPLER_TOKEN
      from platform/common before reading an app's project/config.
    required: true
  project:
    description: Doppler project to read from. Blank defaults to the caller repo name.
    required: false
    default: ""
  config:
    description: Doppler config to read from.
    required: false
    default: prd
  keys:
    description: Newline-delimited secret names to export.
    required: true

runs:
  using: composite
  steps:
    - uses: dopplerhq/cli-action@v3

    - name: Export requested secrets
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.token }}
        PROJECT_INPUT: ${{ inputs.project }}
        CONFIG_INPUT: ${{ inputs.config }}
        SECRET_KEYS: ${{ inputs.keys }}
      run: |
        set -euo pipefail

        project="${PROJECT_INPUT:-}"
        if [ -z "$project" ]; then
          project="${GITHUB_REPOSITORY##*/}"
        fi

        effective_token="$DOPPLER_TOKEN"
        if [ "$project" != "platform" ]; then
          token_key="$(printf '%s' "$project" | tr '[:lower:]-' '[:upper:]_')_DOPPLER_TOKEN"
          app_token="$(doppler secrets get "$token_key" \
            --project platform \
            --config common \
            --plain \
            --token "$DOPPLER_TOKEN" 2>/dev/null || true)"
          if [ -z "$app_token" ]; then
            echo "::error::Missing $token_key in platform/common. The shared CI token can read platform/common, but there is no per-app Doppler token to reach $project/$CONFIG_INPUT."
            exit 1
          fi
          echo "::add-mask::$app_token"
          effective_token="$app_token"
        fi

        json_file="$RUNNER_TEMP/doppler-secrets.json"
        doppler secrets download "$json_file" \
          --project "$project" \
          --config "$CONFIG_INPUT" \
          --token "$effective_token" \
          --format json

        node - "$json_file" <<'NODE'
        const fs = require("fs");

        const jsonPath = process.argv[2];
        const envPath = process.env.GITHUB_ENV;
        const keys = (process.env.SECRET_KEYS || "")
          .split(/\r?\n/)
          .map((key) => key.trim())
          .filter(Boolean);
        const values = JSON.parse(fs.readFileSync(jsonPath, "utf8"));

        for (const key of keys) {
          const value = values[key] ?? "";
          if (value) {
            for (const line of String(value).split(/\r?\n/)) {
              if (line) {
                console.log(`::add-mask::${line}`);
              }
            }
          }
          fs.appendFileSync(envPath, `${key}<<__DOPPLER__\n${value}\n__DOPPLER__\n`);
        }
        NODE

name: axum-web

# Framework wrapper: an axum (server-only, e.g. askama/htmx) app -> flox -> cluster.
# Thin entry point so apps reference a framework-named workflow:
#
#   jobs:
#     ci:
#       uses: apricaut/flox-ci/.github/workflows/axum-web.yml@v1
#       secrets: inherit
#
# All logic lives in _flox-ci.yml; this only presets framework=axum (no wasm
# client, so lint/test is a single host-target pass instead of the dioxus split).
on:
  workflow_call:
    secrets:
      DOPPLER_TOKEN:
        description: "Doppler token scoped to the shared CI config (FloxHub + deploy)"
        required: false # PR runs (incl. Dependabot, which has no Actions secrets) never use it

jobs:
  ci:
    uses: ./.github/workflows/_flox-ci.yml # same-SHA as this wrapper — no internal tag to bump on release
    with:
      framework: axum
    secrets: inherit

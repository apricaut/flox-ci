name: _flox-ci

# BASE reusable pipeline (build -> publish -> push runtime env -> promote) for
# apricaut SERVER apps that deploy to the cluster via flox + ArgoCD.
#
# Don't call this directly — call a framework wrapper, which presets `framework`:
#
#   jobs:
#     ci:
#       uses: apricaut/flox-ci/.github/workflows/dioxus-web.yml@v1   # or axum-web.yml
#       secrets: inherit
#
# The build command lives in each app's flox [build]; this pipeline only varies
# its lint/test shape by `framework`. ONE app build per run: PRs compile-check
# via cargo clippy; push-to-main `flox publish` builds the release artifact once
# (no separate `flox build` — the impure cargo/dx build isn't Nix-cache-reused,
# so a second invocation would just recompile the whole app).
#
# Client releases (desktop/ios/android) live in separate reusable workflows in
# this repo (`tauri-*.yml`) — signing + stores, not flox/k8s — and do NOT use
# this server publish pipeline.
on:
  workflow_call:
    inputs:
      floxhub_owner:
        description: "FloxHub account the package + runtime env are published under"
        type: string
        default: apricaut
      gitops_repo:
        description: "Repo holding apps/<name>/ deploy manifests to promote into"
        type: string
        default: apricaut/apricaut
      doppler_project:
        description: "Doppler project holding the shared CI secrets (FloxHub + deploy tokens)"
        type: string
        default: platform
      doppler_config:
        description: "Doppler config within that project the CI token can read"
        type: string
        default: common
      framework:
        description: "App framework: dioxus (wasm client + server) or axum (server only). Selects the lint/test shape; the build command itself lives in the app's flox [build]."
        type: string
        default: dioxus
    secrets:
      DOPPLER_TOKEN:
        description: "Doppler token scoped to <doppler_project>/<doppler_config>. Only the push-to-main publish/promote steps use it, so it's optional: Dependabot-triggered PR runs don't receive Actions secrets and must still be able to lint+test."
        required: false

env:
  # Compile against the committed .sqlx cache, so fmt/clippy/check need no DB.
  SQLX_OFFLINE: "true"
  # --- Compile-speed knobs (apply to every cargo invocation) ---
  # Incremental compilation only pays off across edits on a warm dev machine; in
  # CI the target dir is restored from cache, so incremental just adds bookkeeping
  # overhead and bloats the cache. Off is faster here.
  CARGO_INCREMENTAL: "0"
  # Skip full debuginfo in the dev profile used by clippy + test. Codegen of debug
  # info is a large slice of a cold dioxus build; line-tables keep panic locations
  # readable without the cost. (The release dx bundle already strips symbols.)
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
  # Don't abort a 25-min build on a transient crates.io blip.
  CARGO_NET_RETRY: "10"
  RUST_BACKTRACE: "1"
  # Fetch git deps via the git CLI (not libgit2), so private apricaut crates
  # resolve through the `url.insteadOf` + App-token auth configured below.
  # libgit2 doesn't reliably honor gitconfig insteadOf/credential settings.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  ci:
    name: build (+ publish on main)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_test
      JWT_SECRET: ci-test-secret-value-that-is-long-enough-for-hmac-validation
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # publish requires the pushed revision

      # Private cargo git deps (apricaut-ui, apricaut-billing-ui, …) live in
      # private org repos. The checkout GITHUB_TOKEN can't clone ACROSS repos, so
      # mint an apricaut App token (all-repos) and point git at it for org clones
      # — BEFORE any cargo step. Without this, private deps only resolve when a
      # warm ~/.cargo/git cache already holds them; a NEW private dep fails with
      # "failed to authenticate". Skipped when Doppler creds aren't available
      # (fork/Dependabot PRs), which only compile-check already-cached deps.
      - name: Install Doppler CLI (private-dep auth)
        if: env.DOPPLER_TOKEN != ''
        uses: dopplerhq/cli-action@v3
      - name: Read apricaut App creds from Doppler
        id: depapp
        if: env.DOPPLER_TOKEN != ''
        env:
          DP_PROJECT: ${{ inputs.doppler_project }}
          DP_CONFIG: ${{ inputs.doppler_config }}
        run: |
          set -euo pipefail
          ID="$(doppler secrets get APRICAUT_APP_ID --project "$DP_PROJECT" --config "$DP_CONFIG" --plain)"
          echo "::add-mask::$ID"
          echo "app-id=$ID" >> "$GITHUB_OUTPUT"
          KEY="$(doppler secrets get APRICAUT_APP_PRIVATE_KEY --project "$DP_PROJECT" --config "$DP_CONFIG" --plain)"
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done <<< "$KEY"
          { echo "private-key<<__PEM__"; printf '%s\n' "$KEY"; echo "__PEM__"; } >> "$GITHUB_OUTPUT"
      - name: Mint apricaut App token for private cargo deps
        id: deptoken
        if: env.DOPPLER_TOKEN != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.depapp.outputs.app-id }}
          private-key: ${{ steps.depapp.outputs.private-key }}
          owner: apricaut
          # no `repositories:` → the token covers every repo the App can access,
          # so any private apricaut crate resolves with no per-repo bookkeeping.
      - name: Authenticate git for private apricaut cargo deps
        if: env.DOPPLER_TOKEN != ''
        env:
          GH_TOKEN: ${{ steps.deptoken.outputs.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/apricaut/".insteadOf \
            "https://github.com/apricaut/"

      # Rust compile cache — registry + target dir, so PRs don't cold-compile
      # every dependency. The toolchain itself needs no cache: flox pulls the
      # locked env from its binary cache in ~30s.
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.flox/env/manifest.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - uses: flox/install-flox-action@v2
      # Apps compose the shared toolchain env (apricaut/flox-environments ->
      # FloxHub). Remote includes need explicit trust on machines that aren't
      # the env's owner — locally the owner is auto-trusted, so a missing
      # trust line only ever fails here.
      - name: Trust the shared toolchain env
        # tyler-harpool entry stays until every app's [include] is flipped to
        # the apricaut copy.
        run: |
          flox config --set "trusted_environments.\"apricaut/rust-toolchain\"" "trust"
          flox config --set "trusted_environments.\"tyler-harpool/rust-toolchain\"" "trust"

      - name: Lint + test inside the Flox env
        # Correctness gate — runs on PRs only. A push to main is a merged PR that
        # already passed this, so main skips straight to the build. Net effect:
        # ONE compile per run (cargo here on PRs; the Nix/dx build below on main),
        # instead of compiling twice in the same run.
        if: github.event_name == 'pull_request'
        env:
          FRAMEWORK: ${{ inputs.framework }}
        run: |
          flox activate -- bash -euo pipefail -c '
            cargo fmt --all -- --check
            cargo clippy --workspace -- -D warnings
            case "$FRAMEWORK" in
              dioxus)
                # dioxus splits client/server: the `server` feature is server-only,
                # so test the workspace without it, then the server crate with it.
                cargo test --workspace --exclude server
                cargo test -p server --features server -- --test-threads=1
                ;;
              *)
                # axum and other server-only frameworks: one host-target test pass.
                # --test-threads=1 because server integration tests share a single
                # Postgres and must not race on database setup/teardown.
                cargo test --workspace -- --test-threads=1
                ;;
            esac
          '

      # NOTE: there is deliberately NO separate `flox build` step. `flox publish`
      # below builds the target itself (from a clean clone), and the build is an
      # impure rustup/cargo/dx-bundle build that Nix does NOT cache-reuse across
      # invocations — so a separate `flox build` would compile the whole app a
      # SECOND time (~13 min wasted). PRs get compile-checked by `cargo clippy`
      # above; the release `dx bundle` is built once, at publish time, on main.

      # ---- everything below runs ONLY on push to main ----
      - uses: dopplerhq/cli-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      - name: Publish package + push the runtime env to FloxHub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # 1. publish: BUILDS the target from a clean clone + publishes it ->
        #    package <owner>/<repo>  (this is the ONE app build per run)
        # 2. install it into the deploy env (relocks onto the new generation)
        # 3. push the deploy env                -> env     <owner>/<repo>
        # FLOX_FLOXHUB_TOKEN (the owner's account token, shared by every app)
        # lives in <project>/<config>; the CI token is account-wide with no
        # default config, so name the project/config explicitly.
        env:
          OWNER: ${{ inputs.floxhub_owner }}
          DP_PROJECT: ${{ inputs.doppler_project }}
          DP_CONFIG: ${{ inputs.doppler_config }}
        run: |
          set -euo pipefail
          APP="${GITHUB_REPOSITORY##*/}"
          dr=(doppler run --project "$DP_PROJECT" --config "$DP_CONFIG" --)
          # -o is required: without it flox publishes to the token's PERSONAL
          # catalog, ignoring the owner input entirely.
          "${dr[@]}" flox publish -o "$OWNER" "$APP"
          # `flox install` skips ids that are already installed, so an owner
          # change (tyler-harpool -> apricaut) would never land — uninstall
          # first to force a re-point at $OWNER's catalog.
          "${dr[@]}" flox uninstall "$APP" -d deploy || true
          "${dr[@]}" flox install "$OWNER/$APP" -d deploy
          # Binaries can lag catalog metadata right after publish ("Can't find
          # download location"); retry while the upload settles.
          for attempt in 1 2 3 4 5; do
            if "${dr[@]}" flox push -d deploy --owner "$OWNER" --force; then
              exit 0
            fi
            echo "deploy env push not ready (attempt ${attempt}); retrying…"
            sleep 20
          done
          echo "failed to push deploy env to FloxHub" >&2; exit 1

      # Pull the apricaut App credentials from Doppler (no GitHub-stored secrets).
      # The private key is masked line-by-line before it ever reaches a step output.
      - name: Read apricaut App creds from Doppler
        id: app
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DP_PROJECT: ${{ inputs.doppler_project }}
          DP_CONFIG: ${{ inputs.doppler_config }}
          GITOPS_REPO: ${{ inputs.gitops_repo }}
        run: |
          set -euo pipefail
          ID="$(doppler secrets get APRICAUT_APP_ID --project "$DP_PROJECT" --config "$DP_CONFIG" --plain)"
          echo "::add-mask::$ID"
          echo "app-id=$ID" >> "$GITHUB_OUTPUT"
          KEY="$(doppler secrets get APRICAUT_APP_PRIVATE_KEY --project "$DP_PROJECT" --config "$DP_CONFIG" --plain)"
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done <<< "$KEY"
          { echo "private-key<<__PEM__"; printf '%s\n' "$KEY"; echo "__PEM__"; } >> "$GITHUB_OUTPUT"
          echo "owner=${GITOPS_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITOPS_REPO##*/}" >> "$GITHUB_OUTPUT"

      # Mint a short-lived token from the apricaut GitHub App, scoped to the gitops
      # repo. The App is installed there with write access (the personal PAT was not,
      # which is the 403 this replaces). The action does the JWT signing for us.
      - name: Mint apricaut App token
        id: token
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.app.outputs.app-id }}
          private-key: ${{ steps.app.outputs.private-key }}
          owner: ${{ steps.app.outputs.owner }}
          repositories: ${{ steps.app.outputs.repo }}

      - name: Promote to the cluster (open + auto-merge a deploy PR)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # `flox push` updated FloxHub, but ArgoCD watches Git, not FloxHub, and the
        # pod only re-pulls its environment on restart. The in-cluster flox shim
        # accepts ONLY a plain owner/name ref in flox.dev/environment (a generation
        # like owner/name/2 CrashLoops the pod), so we DON'T touch that — we bump a
        # flox.dev/revision annotation (a pod-template change ArgoCD rolls on),
        # which makes the pod re-pull the latest published environment.
        env:
          GITOPS_REPO: ${{ inputs.gitops_repo }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          APP="${GITHUB_REPOSITORY##*/}"

          # A brand-new service repo makes GitHub re-evaluate the App
          # installation; for a brief window the freshly minted token can't see
          # the GitOps repo and the clone fails with "Repository not found"
          # (exit 128). Retry so a new app's first deploy doesn't flake while
          # the installation token propagates.
          for attempt in 1 2 3 4 5; do
            if git clone --depth 1 \
                "https://x-access-token:${GH_TOKEN}@github.com/${GITOPS_REPO}.git" gitops; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "clone of $GITOPS_REPO failed after $attempt attempts (token propagation?)" >&2
              exit 1
            fi
            echo "clone failed (attempt ${attempt}); App token may still be propagating; retrying..."
            sleep 10
          done
          cd gitops
          DEPLOY="apps/$APP/base/deployment.yaml"
          # A brand-new service's first publish always races the new-service
          # run: this push fires the moment the code repo is created, but
          # apps/<name>/ only lands on gitops main when the deploy PR merges.
          # Nothing is lost by skipping — the initial ArgoCD sync starts the
          # pod against the latest published env, and the next app push (or a
          # re-run) promotes normally.
          if [ ! -f "$DEPLOY" ]; then
            # First green build of a NEW service: apps/<name>/ lives on the
            # unmerged new-service PR (head branch service/<app>/*). Auto-merge
            # it so the service deploys on its first successful build instead of
            # waiting for a human — the build just proved the env publishes.
            NSPR=$(gh pr list --repo "$GITOPS_REPO" --state open --json number,headRefName \
              -q ".[] | select(.headRefName | startswith(\"service/$APP/\")) | .number" | head -1)
            if [ -n "$NSPR" ]; then
              for attempt in 1 2 3 4 5; do
                if gh pr merge "$NSPR" --repo "$GITOPS_REPO" --squash --delete-branch; then
                  echo "first-build: auto-merged new-service PR #$NSPR"; exit 0
                fi
                echo "new-service PR merge not ready (attempt ${attempt}); retrying..."; sleep 5
              done
            fi
            echo "$DEPLOY not on $GITOPS_REPO main yet and no open service/$APP PR; skipping promote"
            exit 0
          fi
          # yq (YAML-aware; preinstalled on the runner). The manifest is YAML, so
          # jq can't parse it (jq: parse error: Invalid numeric literal).
          SHA="$GITHUB_SHA" yq -i \
            '.spec.template.metadata.annotations["flox.dev/revision"] = strenv(SHA)' \
            "$DEPLOY"
          if git diff --quiet -- "$DEPLOY"; then
            echo "revision unchanged; nothing to promote"; exit 0
          fi

          BRANCH="deploy/$APP/${GITHUB_SHA:0:7}"
          git config user.name "$APP-ci"
          git config user.email "ci@apricaut.com"
          git checkout -b "$BRANCH"
          git commit -am "deploy($APP): roll to ${GITHUB_SHA:0:7}"
          git push origin "$BRANCH"

          gh pr create --repo "$GITOPS_REPO" --base main --head "$BRANCH" \
            --title "deploy($APP): roll to ${GITHUB_SHA:0:7}" \
            --body "Automated promotion from $APP@${GITHUB_SHA:0:7}. Bumps flox.dev/revision so ArgoCD rolls the pod onto the latest published FloxHub environment."

          for attempt in 1 2 3 4 5; do
            if gh pr merge "$BRANCH" --repo "$GITOPS_REPO" --squash --delete-branch; then
              echo "promotion PR merged"; exit 0
            fi
            echo "merge not ready (attempt ${attempt}); retrying..."; sleep 5
          done
          echo "failed to merge promotion PR" >&2; exit 1

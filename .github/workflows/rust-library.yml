name: rust-library

# Reusable validation workflow for standalone Rust library crates.
# App/service delivery stays in axum-web.yml and dioxus-web.yml; this workflow
# is intentionally validation-only so shared crates can consume it without
# accidentally publishing a Flox package or promoting a deployment.
on:
  workflow_call:
    inputs:
      runs_on:
        description: "Runner label"
        type: string
        default: ubuntu-24.04
      rust_toolchain:
        description: "Rust toolchain channel/version"
        type: string
        default: stable
      working_directory:
        description: "Directory containing Cargo.toml"
        type: string
        default: "."
      cargo_scope:
        description: "Optional cargo package/workspace scope, e.g. '--workspace' or '-p crate-name'"
        type: string
        default: ""
    secrets:
      DOPPLER_TOKEN:
        description: "Optional Doppler token used to mint an apricaut App token for private cargo git deps"
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  ci:
    runs-on: ${{ inputs.runs_on }}
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI (private-dep auth)
        if: env.DOPPLER_TOKEN != ''
        uses: dopplerhq/cli-action@v3

      - name: Read apricaut App creds from Doppler
        id: depapp
        if: env.DOPPLER_TOKEN != ''
        run: |
          set -euo pipefail
          id="$(doppler secrets get APRICAUT_APP_ID --project platform --config common --plain)"
          echo "::add-mask::$id"
          echo "app-id=$id" >> "$GITHUB_OUTPUT"

          key="$(doppler secrets get APRICAUT_APP_PRIVATE_KEY --project platform --config common --plain)"
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done <<< "$key"
          {
            echo "private-key<<__PEM__"
            printf '%s\n' "$key"
            echo "__PEM__"
          } >> "$GITHUB_OUTPUT"

      - name: Mint apricaut App token for private cargo deps
        id: deptoken
        if: env.DOPPLER_TOKEN != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.depapp.outputs.app-id }}
          private-key: ${{ steps.depapp.outputs.private-key }}
          owner: apricaut

      - name: Authenticate git for private apricaut cargo deps
        if: env.DOPPLER_TOKEN != ''
        env:
          GH_TOKEN: ${{ steps.deptoken.outputs.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/apricaut/".insteadOf \
            "https://github.com/apricaut/"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.working_directory }}

      - name: Validate library crate
        working-directory: ${{ inputs.working_directory }}
        env:
          CARGO_SCOPE: ${{ inputs.cargo_scope }}
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy ${CARGO_SCOPE} --all-targets -- -D warnings
          cargo test ${CARGO_SCOPE} --all-targets
          cargo build ${CARGO_SCOPE}

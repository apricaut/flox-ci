name: tauri-desktop

on:
  workflow_call:
    inputs:
      app_name:
        description: App slug used in release names and asset labels.
        type: string
        default: ""
      server_url:
        description: URL baked into the WASM client for API calls.
        type: string
        required: true
      dx_version:
        description: Dioxus CLI version matching the app's Cargo.toml pin.
        type: string
        required: true
      tauri_cli_version:
        description: cargo-tauri version for the desktop build.
        type: string
        default: "2.11.2"
      tauri_workdir:
        description: Directory containing tauri.conf.json and the Tauri crate.
        type: string
        default: src-tauri
      release_label:
        description: Optional explicit release label for manual reruns.
        type: string
        default: ""
      doppler_project:
        description: Doppler project holding release secrets. Blank defaults to the repo name.
        type: string
        default: ""
      doppler_config:
        description: Doppler config holding release secrets.
        type: string
        default: prd
    secrets:
      DOPPLER_TOKEN:
        description: Doppler token used to read the app release secrets.
        required: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: blacksmith-6vcpu-macos-15
            args: --target universal-apple-darwin
          - platform: ubuntu-24.04
            args: ""
          - platform: ubuntu-24.04-arm
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve app metadata
        id: meta
        shell: bash
        run: |
          app_name='${{ inputs.app_name }}'
          doppler_project='${{ inputs.doppler_project }}'
          if [ -z "$app_name" ]; then
            app_name="${GITHUB_REPOSITORY##*/}"
          fi
          if [ -z "$doppler_project" ]; then
            doppler_project="${GITHUB_REPOSITORY##*/}"
          fi
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "doppler_project=$doppler_project" >> "$GITHUB_OUTPUT"

      - name: Install Linux deps (Ubuntu x64 + ARM)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev pkg-config \
            xdg-utils file

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./${{ inputs.tauri_workdir }} -> target

      - uses: cargo-bins/cargo-binstall@v1.19.1

      - name: Install dx CLI
        run: cargo binstall --no-confirm --disable-telemetry --force dioxus-cli@${{ inputs.dx_version }}

      - uses: apricaut/flox-ci/.github/actions/doppler/export-secrets@main
        with:
          token: ${{ secrets.DOPPLER_TOKEN }}
          project: ${{ steps.meta.outputs.doppler_project }}
          config: ${{ inputs.doppler_config }}
          keys: |
            TAURI_SIGNING_PRIVATE_KEY
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
            KEYCHAIN_PASSWORD

      - name: Flag available desktop signing secrets
        id: secret_flags
        shell: bash
        run: |
          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            echo "has_apple_certificate=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple_certificate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest' && steps.secret_flags.outputs.has_apple_certificate == 'true'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm $RUNNER_TEMP/certificate.p12

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SERVER_URL: ${{ inputs.server_url }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        with:
          tagName: ${{ inputs.release_label != '' && inputs.release_label || (github.event_name == 'push' && github.ref_name) || format('dev-{0}', github.sha) }}
          releaseName: "${{ steps.meta.outputs.app_name }} ${{ inputs.release_label != '' && inputs.release_label || (github.event_name == 'push' && github.ref_name) || format('dev-{0}', github.sha) }}"
          releaseBody: "Auto-built desktop bundles. See `Assets` below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

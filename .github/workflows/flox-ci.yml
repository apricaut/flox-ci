name: flox-ci

# Reusable Flox build -> publish -> push runtime env -> promote pipeline for
# apricaut services. Each app's .github/workflows/flox.yml is a thin caller:
#
#   jobs:
#     ci:
#       uses: apricaut/flox-ci/.github/workflows/flox-ci.yml@v1
#       secrets: inherit
#
# ONE job: the app is built exactly once. `flox build` populates the Nix store,
# then on push-to-main the `flox publish` step reuses that derivation (cache
# hit) instead of rebuilding — so merges don't pay for two ~20-min builds.
# Everything (toolchain via flox, build, publish, env push, promotion, caching)
# lives HERE so the pipeline changes in one place across every product.
on:
  workflow_call:
    inputs:
      floxhub_owner:
        description: "FloxHub account the package + runtime env are published under"
        type: string
        default: tyler-harpool
      gitops_repo:
        description: "Repo holding apps/<name>/ deploy manifests to promote into"
        type: string
        default: apricaut/apricaut
      doppler_project:
        description: "Doppler project holding the shared CI secrets (FloxHub + deploy tokens)"
        type: string
        default: platform
      doppler_config:
        description: "Doppler config within that project the CI token can read"
        type: string
        default: common
    secrets:
      DOPPLER_TOKEN:
        description: "Doppler token scoped to <doppler_project>/<doppler_config>"
        required: true

env:
  # Compile against the committed .sqlx cache, so fmt/clippy/check need no DB.
  SQLX_OFFLINE: "true"

jobs:
  ci:
    name: build (+ publish on main)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_test
      JWT_SECRET: ci-test-secret-value-that-is-long-enough-for-hmac-validation
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # publish requires the pushed revision
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          df -h /
      # Persist the Flox env cache (rustup toolchain + cargo registry/git) and the
      # cargo target dir, so lint/test don't reinstall the toolchain or recompile
      # deps each run.
      - name: Cache Flox toolchain + cargo + target
        uses: actions/cache@v4
        with:
          path: |
            .flox/cache
            target
          key: flox-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.flox/env/manifest.lock') }}
          restore-keys: |
            flox-${{ runner.os }}-
      - uses: flox/install-flox-action@v2
      # Cache the Nix store (flox build outputs + toolchain + deps) via the free
      # GitHub Actions cache backend — `flox build` is a hermetic Nix build, so
      # unchanged builds become near-instant and changed ones reuse unchanged
      # store paths. GC keeps the cached store from outgrowing the cache limit.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.flox/env/manifest.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 604800
          purge-primary-key: never

      - name: Lint + test inside the Flox env
        run: |
          flox activate -- bash -euo pipefail -c '
            cargo fmt --all -- --check
            cargo clippy --workspace -- -D warnings
            cargo test --workspace --exclude server
            cargo test -p server --features server -- --test-threads=1
          '

      - name: Build the app (Flox package)
        # The build target is named after the repo (apri rewrites [build.<repo>]
        # on scaffold). This populates the Nix store; the publish step below
        # reuses the exact derivation rather than rebuilding.
        run: |
          APP="${GITHUB_REPOSITORY##*/}"
          flox build "$APP"
          test -x "result-$APP/bin/app"
          test -f "result-$APP/bin/public/index.html"

      # ---- everything below runs ONLY on push to main ----
      - uses: dopplerhq/cli-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      - name: Publish package + push the runtime env to FloxHub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # 1. publish the (already-built) target -> package <owner>/<repo>
        # 2. install it into the deploy env (relocks onto the new generation)
        # 3. push the deploy env                -> env     <owner>/<repo>
        # FLOX_FLOXHUB_TOKEN (the owner's account token, shared by every app)
        # lives in <project>/<config>; the CI token is account-wide with no
        # default config, so name the project/config explicitly.
        env:
          OWNER: ${{ inputs.floxhub_owner }}
          DP_PROJECT: ${{ inputs.doppler_project }}
          DP_CONFIG: ${{ inputs.doppler_config }}
        run: |
          set -euo pipefail
          APP="${GITHUB_REPOSITORY##*/}"
          dr=(doppler run --project "$DP_PROJECT" --config "$DP_CONFIG" --)
          "${dr[@]}" flox publish "$APP"
          "${dr[@]}" flox install "$OWNER/$APP" -d deploy
          "${dr[@]}" flox push -d deploy --owner "$OWNER" --force

      - name: Promote to the cluster (open + auto-merge a deploy PR)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # `flox push` updated FloxHub, but ArgoCD watches Git, not FloxHub, and the
        # pod only re-pulls its environment on restart. The in-cluster flox shim
        # accepts ONLY a plain owner/name ref in flox.dev/environment (a generation
        # like owner/name/2 CrashLoops the pod), so we DON'T touch that — we bump a
        # flox.dev/revision annotation (a pod-template change ArgoCD rolls on),
        # which makes the pod re-pull the latest published environment.
        env:
          GITOPS_REPO: ${{ inputs.gitops_repo }}
          DP_PROJECT: ${{ inputs.doppler_project }}
          DP_CONFIG: ${{ inputs.doppler_config }}
        run: |
          set -euo pipefail
          APP="${GITHUB_REPOSITORY##*/}"
          DEPLOY_TOKEN="$(doppler secrets get APRICAUT_DEPLOY_TOKEN --project "$DP_PROJECT" --config "$DP_CONFIG" --plain)"
          echo "::add-mask::$DEPLOY_TOKEN"
          export GH_TOKEN="$DEPLOY_TOKEN"

          git clone --depth 1 \
            "https://x-access-token:${DEPLOY_TOKEN}@github.com/${GITOPS_REPO}.git" gitops
          cd gitops
          DEPLOY="apps/$APP/base/deployment.yaml"
          jq -c --arg sha "$GITHUB_SHA" \
            '.spec.template.metadata.annotations["flox.dev/revision"] = $sha' \
            "$DEPLOY" > "$DEPLOY.tmp"
          mv "$DEPLOY.tmp" "$DEPLOY"
          if git diff --quiet -- "$DEPLOY"; then
            echo "revision unchanged; nothing to promote"; exit 0
          fi

          BRANCH="deploy/$APP/${GITHUB_SHA:0:7}"
          git config user.name "$APP-ci"
          git config user.email "ci@apricaut.com"
          git checkout -b "$BRANCH"
          git commit -am "deploy($APP): roll to ${GITHUB_SHA:0:7}"
          git push origin "$BRANCH"

          gh pr create --repo "$GITOPS_REPO" --base main --head "$BRANCH" \
            --title "deploy($APP): roll to ${GITHUB_SHA:0:7}" \
            --body "Automated promotion from $APP@${GITHUB_SHA:0:7}. Bumps flox.dev/revision so ArgoCD rolls the pod onto the latest published FloxHub environment."

          for attempt in 1 2 3 4 5; do
            if gh pr merge "$BRANCH" --repo "$GITOPS_REPO" --squash --delete-branch; then
              echo "promotion PR merged"; exit 0
            fi
            echo "merge not ready (attempt ${attempt}); retrying..."; sleep 5
          done
          echo "failed to merge promotion PR" >&2; exit 1

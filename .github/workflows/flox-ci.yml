name: flox-ci

# DEPRECATED back-compat shim. Older app callers reference
# `apricaut/flox-ci/.github/workflows/flox-ci.yml@v1`; this forwards them to the
# dioxus-web pipeline so they keep working after the by-framework reorg.
#
# New apps should call a framework wrapper directly:
#   uses: apricaut/flox-ci/.github/workflows/dioxus-web.yml@v1   # or axum-web.yml
#
# Migrate the remaining callers to dioxus-web.yml, then delete this file.
on:
  workflow_call:
    secrets:
      DOPPLER_TOKEN:
        description: "Doppler token scoped to the shared CI config (FloxHub + deploy)"
        required: false # PR runs (incl. Dependabot, which has no Actions secrets) never use it

jobs:
  ci:
    uses: ./.github/workflows/_flox-ci.yml # same-SHA as this wrapper — no internal tag to bump on release
    with:
      framework: dioxus
    secrets: inherit

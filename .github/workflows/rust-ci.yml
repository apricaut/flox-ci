name: rust-ci

# Generic Rust server-app wrapper: build/test -> publish Flox package -> push
# runtime env -> promote. Use this for axum/askama/htmx/API services and other
# Rust server apps that do not need the Dioxus wasm-specific lint/test split.
#
#   jobs:
#     ci:
#       uses: apricaut/flox-ci/.github/workflows/rust-ci.yml@v6
#       secrets: inherit
#
# All logic lives in _flox-ci.yml; this presets framework=axum, which means a
# single host-target fmt/clippy/test pass before the main-branch publish.
on:
  workflow_call:
    inputs:
      deploy_manifest:
        description: "Path to the deployment manifest in the gitops repo. {name} is replaced with the repo name. Default: apps/{name}/base/deployment.yaml. Platform services pass argocd/addons/manifests/{name}/deployment.yaml."
        type: string
        default: "apps/{name}/base/deployment.yaml"
    secrets:
      DOPPLER_TOKEN:
        description: "Doppler token scoped to the shared CI config (FloxHub + deploy)"
        required: false # PR runs (incl. Dependabot, which has no Actions secrets) never use it

jobs:
  ci:
    uses: ./.github/workflows/_flox-ci.yml # same-SHA as this wrapper — no internal tag to bump on release
    with:
      framework: axum
      deploy_manifest: ${{ inputs.deploy_manifest }}
    secrets: inherit
